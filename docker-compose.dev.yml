services:
  db:
    image: postgres:17-alpine
    container_name: news-cms-db-dev
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-johndoe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-randompassword}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: news-cms-pgadmin-dev
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: news-cms-app-dev
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-johndoe}:${POSTGRES_PASSWORD:-randompassword}@db:5432/${POSTGRES_DB:-mydb}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-yoursecret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      WATCHPACK_POLLING: "true" # Enables HMR in some Docker environments
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - db

volumes:
  postgres_data_dev:
